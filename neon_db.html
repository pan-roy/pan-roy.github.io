<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>NeonDB WDC</title>

  <!-- Latest Web Data Connector library -->
  <script src="https://connectors.tableau.com/libs/tableauwdc-2.4.latest.js"></script>
</head>

<body>
  <h3>NeonDB Comments Connector</h3>
  <button id="submitButton">Load Data</button>

  <script type="text/javascript">
    // define connector
    var myConnector = tableau.makeConnector();

    myConnector.getSchema = function (schemaCallback) {
      var cols = [
        { id: "id", dataType: tableau.dataTypeEnum.int },
        { id: "header", dataType: tableau.dataTypeEnum.string }
      ];

      var tableSchema = {
        id: "comments",
        alias: "Comments from NeonDB",
        columns: cols
      };

      schemaCallback([tableSchema]);
    };

    myConnector.getData = function (table, doneCallback) {
      fetch("https://https://faas-syd1-c274eac6.doserverless.co/api/v1/web/fn-271b5d5b-c1b8-47f3-939b-678abacfd365/default/tableau/api/comments")
        .then(response => response.json())
        .then(data => {
          table.appendRows(data);
          doneCallback();
        })
        .catch(err => {
          console.error("Fetch error:", err);
          doneCallback();
        });
    };

    // register the connector
    tableau.registerConnector(myConnector);

    // attach event listener
    document.getElementById("submitButton").addEventListener("click", function () {
      // This tells Tableau to run getSchema and getData
      tableau.connectionName = "NeonDB Comments";
      tableau.submit();
    });

  </script>
</body>
</html>
